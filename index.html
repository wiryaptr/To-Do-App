<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "container">
        <button id="darkModeBtn">Dark Mode</button>
        <header>
            <h1>To-Do App</h1>
            <p>Stay Productive Today!</p>
        </header>

        <div class = "todo-input">

            <input type = "text" id="taskInput" placeholder="Masukkan Tugas">

            <select id="prioritySelect">
                <option value="High">High Priority</option>
                <option value="Medium">Medium Priority</option>
                <option value="Low">Low Priority</option>
            </select>

            <input type="date" id="deadlineInput">

            <button id="addBtn">Tambah</button> 
        </div>

        <div class="filters">
            <button id="allBtn">All</button>
            <button id="activeBtn">Active</button>
            <button id="completedBtn">Completed</button>
        </div>

        <div class="backup-tools">
            <button id="exportBtn">Export Tasks</button>
            <label for="importFile" class="file-btn">
                Pilih File
            </label>
            <input type="file" id="importFile" accept=".json" hidden>
            <button id="importBtn">Import Tasks</button>
        </div>

        <input type="text" id="searchInput" placeholder="Cari tugas">

        <div class="progress-container">
            <div class="progress-info">
                <span id="progressText">
                    0% Complete
                </span>
            </div>
        </div>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h3 id="totalStat">0</h3>
                <p>Total</p>
            </div>
            <div class="stat-card">
                <h3 id="completedStat">0</h3>
                <p>Completed</p>
            </div>
            <div class="stat-card">
                <h3 id="activeStat">0</h3>
                <p>Active</p>
            </div>
            <div class="stat-card">
                <h3 id="highPriorityStat">0</h3>
                <p>High Priority</p>
            </div>
        </div>
        
            <div id="emptyMessage">
                <h3>No Tasks Yet</h3>
                <p> Tambahkan tugas pertamamu </p>
            </div>
        <ul id="taskList"></ul>
        <footer>
            <p id="taskCount">Total Tugas : 0</p>
        </footer>
        <div id="toast"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
